name: Release

on:
  workflow_dispatch:
    inputs:
      level:
        description: 'Semver level to bump'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

# Only one release may run at a time.
concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # Bump the version, commit, tag, and push to main.
  prepare:
    name: Bump version & tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # PAT with contents:write that can push to protected main.
          token: ${{ secrets.GA_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Bump version
        id: bump
        env:
          LEVEL: ${{ inputs.level }}
        run: |
          set -euo pipefail
          cargo set-version --bump "$LEVEL"
          VERSION=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name == "city3d_stac") | .version')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${VERSION}"

      - name: Commit, tag and push
        env:
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: release ${TAG}"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin main
          git push origin "${TAG}"

  # Build release binaries for all platforms at the new tag.
  build-release:
    name: Build Release (${{ matrix.target }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: city3dstac
            asset_name: city3dstac-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: city3dstac
            asset_name: city3dstac-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: city3dstac
            asset_name: city3dstac-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: city3dstac
            asset_name: city3dstac-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: city3dstac.exe
            asset_name: city3dstac-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  # Publish to crates.io before creating the GitHub release.
  publish-crate:
    name: Publish to crates.io
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Create the GitHub Release only after crates.io publish and builds succeed.
  create-release:
    name: Create GitHub Release
    needs: [prepare, build-release, publish-crate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          set -euo pipefail
          cd artifacts
          for dir in */; do
            for file in "$dir"*; do
              [ -f "$file" ] && sha256sum "$file" >> checksums.txt
            done
          done
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, 'alpha') || contains(needs.prepare.outputs.version, 'beta') || contains(needs.prepare.outputs.version, 'rc') }}
          generate_release_notes: true
          files: |
            artifacts/city3dstac-linux-amd64/*
            artifacts/city3dstac-linux-arm64/*
            artifacts/city3dstac-macos-amd64/*
            artifacts/city3dstac-macos-arm64/*
            artifacts/city3dstac-windows-amd64.exe/*
            artifacts/checksums.txt
